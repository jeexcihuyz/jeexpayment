<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Official Payment Jeex</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  
  <style>
    /* ============================== */
    /* CSS STYLING & VARIABLES        */
    /* ============================== */
    :root {
      --bg0: #070a12;
      --bg1: #0b1220;
      --card: #0b1220cc;
      --stroke: #ffffff1a;
      --text: #eaf2ff;
      --muted: #b7c5da;
      --accent1: #00D4FF;
      --accent2: #A855F7;
      --accent3: #22C55E;
      --shadow: 0 20px 80px rgba(0, 0, 0, .55);
      --radius: 22px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 600px at 20% 15%, rgba(168, 85, 247, .22), transparent 55%),
        radial-gradient(900px 520px at 80% 25%, rgba(0, 212, 255, .20), transparent 55%),
        radial-gradient(900px 520px at 55% 85%, rgba(34, 197, 94, .12), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x: hidden;
    }

    /* --- BACKGROUND GRID & BLOBS --- */
    .grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(to right, rgba(255, 255, 255, .04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, .04) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at 50% 30%, #000 0 55%, transparent 72%);
      pointer-events: none; opacity: .55; z-index: 0;
    }

    .blob {
      position: fixed; width: 520px; height: 520px;
      filter: blur(36px); opacity: .35; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--accent1), transparent 55%),
        radial-gradient(circle at 70% 70%, var(--accent2), transparent 55%);
      animation: floaty 10s ease-in-out infinite;
      pointer-events: none; z-index: 0;
    }

    .blob.b2 {
      width: 560px; height: 560px; left: auto;
      background: radial-gradient(circle at 30% 30%, var(--accent3), transparent 55%),
        radial-gradient(circle at 70% 70%, var(--accent2), transparent 60%);
      animation-duration: 13s; opacity: .26;
    }

    @keyframes floaty {
      0% { transform: translate(-8%, -6%) scale(1); }
      50% { transform: translate(10%, 8%) scale(1.05); }
      100% { transform: translate(-8%, -6%) scale(1); }
    }

    /* --- BACKGROUND FLOATING ICONS --- */
    .bg-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1; pointer-events: none; overflow: hidden;
    }
    .floating-item {
      position: absolute; bottom: -100px; color: var(--accent1);
      font-size: 3rem; opacity: 0.04; animation: floatUp linear infinite;
    }
    .floating-item:nth-child(1) { left: 10%; animation-duration: 15s; font-size: 4rem; }
    .floating-item:nth-child(2) { left: 30%; animation-duration: 20s; font-size: 2.5rem; animation-delay: 3s;}
    .floating-item:nth-child(3) { left: 50%; animation-duration: 18s; font-size: 5rem; animation-delay: 7s; color: var(--accent2); }
    .floating-item:nth-child(4) { left: 70%; animation-duration: 22s; font-size: 3rem; animation-delay: 2s; }
    .floating-item:nth-child(5) { left: 85%; animation-duration: 16s; font-size: 4.5rem; animation-delay: 5s; color: var(--accent3); }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
      20% { opacity: 0.08; }
      80% { opacity: 0.08; }
      100% { transform: translateY(-120vh) rotate(360deg) scale(1.2); opacity: 0; }
    }

    /* --- MAIN WRAPPER & CARD --- */
    .wrap {
      min-height: 100%; display: flex; align-items: center;
      justify-content: center; padding: 38px 18px; position: relative; z-index: 10;
    }

    .card {
      width: min(500px, 100%);
      background: var(--card); border: 1px solid var(--stroke);
      border-radius: var(--radius); box-shadow: var(--shadow);
      overflow: hidden; position: relative; backdrop-filter: blur(15px);
      animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideDown { 
      from { opacity: 0; transform: translateY(-30px) scale(0.95); } 
      to { opacity: 1; transform: translateY(0) scale(1); } 
    }

    /* --- TOPBAR & PROFILE --- */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; padding: 18px 22px; border-bottom: 1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(255, 255, 255, .06), transparent);
    }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; }
    .mark {
      width: 45px; height: 45px; border-radius: 14px;
      border: 1px solid var(--stroke); object-fit: cover;
      box-shadow: 0 5px 15px rgba(0,212,255,0.2);
    }
    .brand small { display: block; font-weight: 600; color: var(--muted); display: flex; align-items: center; gap: 4px; }
    .brand small i { color: var(--accent1); }

    .pill {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      border-radius: 999px; border: 1px solid var(--stroke);
      color: var(--muted); font-size: 13px; background: rgba(255, 255, 255, .04);
    }
    .pulse {
      width: 9px; height: 9px; border-radius: 99px; background: var(--accent3);
      box-shadow: 0 0 0 0 rgba(34, 197, 94, .55); animation: ping 1.6s infinite;
    }
    @keyframes ping {
      0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, .55); }
      70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }

    /* --- CONTENT & BUTTONS --- */
    .content {
      display: grid; grid-template-columns: 1fr;
      gap: 15px; padding: 28px 22px 35px;
    }

    h1 { margin: 5px 0 10px; font-size: clamp(24px, 4vw, 30px); line-height: 1.1; }
    .lead { color: var(--muted); font-size: 14px; line-height: 1.6; margin: 5px 0 15px; }
    .grad {
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .features {
      display: grid; grid-template-columns: 1fr;
      gap: 15px; margin-top: 10px;
      animation: slideUp 0.8s ease-out 0.2s backwards;
    }

    @keyframes slideUp { 
      from { opacity: 0; transform: translateY(20px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    .feat {
      border: 1px solid var(--stroke); background: rgba(255, 255, 255, .03);
      border-radius: 18px; padding: 16px; display: flex; gap: 15px;
      align-items: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative; overflow: hidden; /* Buat Ripple */
    }

    .feat:hover {
      background: rgba(255, 255, 255, .08);
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }
    
    /* Animasi pas beneran diklik (Mentul) */
    .feat.is-clicked {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.12);
      border-color: var(--accent1);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
    }

    .ico {
      width: 45px; height: 45px; border-radius: 14px;
      border: 1px solid var(--stroke); background: rgba(255, 255, 255, .04);
      display: grid; place-items: center; flex: 0 0 auto; font-size: 22px;
      background: linear-gradient(135deg, rgba(0, 212, 255, .1), rgba(168, 85, 247, .1));
    }

    .feat h3 { margin: 0; font-size: 16px; font-weight: 700; }
    .feat p { margin: 4px 0 0; color: var(--muted); font-size: 12px; line-height: 1.5; }

    /* --- MODAL POPUP & COPY --- */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(10px);
      justify-content: center; align-items: center; padding: 20px; z-index: 1000;
      opacity: 0; transition: opacity 0.3s ease;
    }
    .modal-overlay.active { display: flex; opacity: 1; }

    .modal-content {
      background: var(--card); width: 100%; max-width: 380px;
      padding: 30px 25px; border-radius: var(--radius); position: relative;
      text-align: center; border: 1px solid var(--stroke); box-shadow: var(--shadow);
      transform: translateY(30px) scale(0.95); opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.active .modal-content { transform: translateY(0) scale(1); opacity: 1; }

    .close-btn {
      position: absolute; top: 15px; right: 20px; font-size: 24px;
      cursor: pointer; color: var(--muted); transition: 0.3s;
    }
    .close-btn:hover { color: var(--accent1); transform: rotate(90deg); }

    .qris-img { width: 100%; max-width: 250px; border-radius: 14px; border: 2px solid var(--stroke); margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

    .copy-container {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255, 255, 255, 0.04); padding: 15px;
      border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--stroke);
      text-align: left; transition: 0.3s;
    }
    .copy-container:hover { background: rgba(255,255,255,0.08); }

    .copy-container span { font-size: 13px; color: var(--muted); }
    .copy-container strong { color: var(--text); font-size: 15px; display: block; margin-top: 3px; font-family: monospace; letter-spacing: 0.5px;}

    .copy-btn {
      background: linear-gradient(135deg, rgba(0, 212, 255, .18), rgba(168, 85, 247, .18));
      color: var(--text); border: 1px solid rgba(0, 212, 255, .35);
      width: 42px; height: 42px; border-radius: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative; overflow: hidden;
    }
    .copy-btn:hover { background: rgba(0, 212, 255, .35); box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3); }

    .pop-anim { animation: clickPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes clickPop {
      0% { transform: scale(1); }
      50% { transform: scale(0.8); }
      100% { transform: scale(1.1); }
    }

    .ripple {
      position: absolute; background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      transform: scale(0); animation: rippleAnim 0.5s linear; pointer-events: none;
    }
    @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

  </style>
</head>

<body>
  <div class="grid"></div>
  <div class="blob" style="top:-140px; left:-160px;"></div>
  <div class="blob b2" style="bottom:-180px; right:-170px;"></div>
  
  <div class="bg-animation">
    <i class="ri-money-dollar-circle-line floating-item"></i>
    <i class="ri-shield-star-line floating-item"></i>
    <i class="ri-vip-diamond-line floating-item"></i>
    <i class="ri-wallet-3-line floating-item"></i>
    <i class="ri-bank-card-line floating-item"></i>
  </div>

  <main class="wrap">
    <section class="card">
      <div class="topbar">
        <div class="brand">
          <img src="logo.png" alt="Logo" class="mark">
          <div>
            <div>Jeex Payment</div>
            <small>@gBrandalan <i class="ri-verified-badge-fill"></i></small>
          </div>
        </div>

        <div class="pill" title="Status">
          <span class="pulse" aria-hidden="true"></span>
          <span>Online</span>
        </div>
      </div>

      <div class="content">
        <div>
          <h1>Pilih Metode <span class="grad">Pembayaran</span></h1>
          <p class="lead">Silakan pilih metode pembayaran yang tersedia di bawah ini untuk menyelesaikan transaksi.</p>

          <div class="features">
            <div class="feat ripple-trigger" onclick="handleCardClick('qris', this)">
              <div class="ico" aria-hidden="true" style="color: var(--accent1);">
                <i class="ri-qr-scan-2-line"></i>
              </div>
              <div>
                <h3>QRIS All Payment</h3>
                <p>Scan otomatis dari semua E-Wallet & M-Banking.</p>
              </div>
            </div>

            <div class="feat ripple-trigger" onclick="handleCardClick('ewallet', this)">
              <div class="ico" aria-hidden="true" style="color: var(--accent2);">
                <i class="ri-wallet-3-fill"></i>
              </div>
              <div>
                <h3>E-Wallet</h3>
                <p>Dana & GoPay.</p>
              </div>
            </div>

            <div class="feat ripple-trigger" onclick="handleCardClick('bank', this)">
              <div class="ico" aria-hidden="true" style="color: var(--accent3);">
                <i class="ri-bank-card-fill"></i>
              </div>
              <div>
                <h3>Transfer Bank</h3>
                <p>SeaBank.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="paymentModal" class="modal-overlay">
    <div class="modal-content">
      <i class="ri-close-line close-btn" onclick="closeModal()"></i>
      <h2 id="modalTitle" class="grad" style="margin-bottom: 20px; font-size: 22px;">Judul</h2>
      <div id="modalBody">
        </div>
    </div>
  </div>

  <script>
    const paymentData = {
      qris: {
        title: "SCAN QRIS",
        content: `
          <img src="qris.jpg" alt="QRIS" class="qris-img">
          <p style="margin-top:15px; font-size:13px; color:var(--muted);">Scan kode QR untuk melakukan pembayaran</p>
        `
      },
      ewallet: {
        title: "E-WALLET",
        content: `
          <div>
            <div class="copy-container">
              <span>DANA<br> <strong id="dana-num">083135825844</strong></span>
              <button class="copy-btn ripple-trigger js-copy-btn" onclick="copyText('dana-num', this)">
                <i class="ri-file-copy-line"></i>
              </button>
            </div>
            <div class="copy-container">
              <span>GOPAY<br> <strong id="gopay-num">083135825844</strong></span>
              <button class="copy-btn ripple-trigger js-copy-btn" onclick="copyText('gopay-num', this)">
                <i class="ri-file-copy-line"></i>
              </button>
            </div>
          </div>
          <p style="margin-top:15px; font-size:13px; color:var(--muted);">a.n. A J</p>
        `
      },
      bank: {
        title: "TRANSFER BANK",
        content: `
          <div>
            <div class="copy-container">
              <span>SEABANK<br> <strong id="seabank-num">901901891501</strong></span>
              <button class="copy-btn ripple-trigger js-copy-btn" onclick="copyText('seabank-num', this)">
                <i class="ri-file-copy-line"></i>
              </button>
            </div>
          </div>
          <p style="margin-top:15px; font-size:13px; color:var(--muted);">a.n. A J</p>
        `
      }
    };

    const modal = document.getElementById("paymentModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");

    // Fungsi klik kartu biar kerasa animasinya dulu baru buka modal
    function handleCardClick(type, element) {
      // Tambahin class mentul
      element.classList.add('is-clicked');
      
      // Ilangin class mentul setelah animasi kelar
      setTimeout(() => {
        element.classList.remove('is-clicked');
      }, 300);

      // Kasih jeda 180ms biar efek ripple & klik manjain mata dulu sebelum modal nutupin layar
      setTimeout(() => {
        modalTitle.innerHTML = paymentData[type].title;
        modalBody.innerHTML = paymentData[type].content;
        modal.classList.add('active'); 
      }, 180);
    }

    function closeModal() {
      modal.classList.remove('active');
    }

    window.onclick = function(event) {
      if (event.target == modal) {
        closeModal();
      }
    }

    // Fungsi Copy + Animasi Pop
    function copyText(elementId, btn) {
      const textToCopy = document.getElementById(elementId).innerText;
      const icon = btn.querySelector('i');
      
      navigator.clipboard.writeText(textToCopy).then(() => {
        btn.classList.add('pop-anim');
        icon.className = "ri-check-line";
        btn.style.background = "var(--accent3)"; 
        btn.style.borderColor = "var(--accent3)";
        btn.style.color = "#000";
        
        setTimeout(() => {
          icon.className = "ri-file-copy-line";
          btn.style.background = "linear-gradient(135deg, rgba(0, 212, 255, .18), rgba(168, 85, 247, .18))"; 
          btn.style.borderColor = "rgba(0, 212, 255, .35)";
          btn.style.color = "var(--text)";
          btn.classList.remove('pop-anim');
        }, 1500);
      });
    }

    // Efek Ripple Air
    document.addEventListener('click', function(e) {
      const btn = e.target.closest('.ripple-trigger');
      if (!btn) return;
      
      const existingRipple = btn.querySelector('.ripple');
      if (existingRipple) { existingRipple.remove(); }
      
      const circle = document.createElement('span');
      const diameter = Math.max(btn.clientWidth, btn.clientHeight);
      const radius = diameter / 2;
      const rect = btn.getBoundingClientRect();
      
      circle.style.width = circle.style.height = `${diameter}px`;
      circle.style.left = `${e.clientX - rect.left - radius}px`;
      circle.style.top = `${e.clientY - rect.top - radius}px`;
      circle.classList.add('ripple');
      
      btn.appendChild(circle);
    });
  </script>
</body>
</html>
